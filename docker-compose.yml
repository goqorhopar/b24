version: '3.8'

services:
  meeting-bot:
    build: .
    container_name: meeting-bot-assistant
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BITRIX_WEBHOOK_URL=${BITRIX_WEBHOOK_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
    volumes:
      - ./telegram_bot.js:/app/telegram_bot.js:ro
      - ./router.py:/app/router.py:ro
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "3000:3000"
    working_dir: /app
    command: >
      sh -c "
        npm install &&
        node telegram_bot.js
      "
    depends_on:
      - nginx

  nginx:
    image: nginx:alpine
    container_name: meeting-bot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - meeting-bot

  watchtower:
    image: containrrr/watchtower
    container_name: meeting-bot-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300