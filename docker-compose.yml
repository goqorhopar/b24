version: '3.8'

services:
  app:
    build: .
    container_name: meeting-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PYTHONPATH=/app
      - DISPLAY=:99
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - postgres
    networks:
      - meeting-bot-network

  postgres:
    image: postgres:14-alpine
    container_name: meeting-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeting_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - meeting-bot-network

  redis:
    image: redis:7-alpine
    container_name: meeting-bot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - meeting-bot-network

  nginx:
    image: nginx:alpine
    container_name: meeting-bot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - meeting-bot-network

volumes:
  postgres_data:
  redis_data:

networks:
  meeting-bot-network:
    driver: bridge
