services:
  - type: web
    name: telegram-gemini-sales-bot
    env: python
    region: oregon # Можно изменить на нужный регион
    plan: starter # Можно изменить на нужный план
    
    # Команды сборки и запуска
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --worker-class sync --max-requests 1000 --preload --access-logfile - --error-logfile -
    
    # Настройки автодеплоя
    autoDeploy: true
    
    # Переменные окружения
    envVars:
      # Обязательные переменные (нужно будет настроить в Render Dashboard)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      
      # Опциональные переменные для Bitrix24
      - key: BITRIX_WEBHOOK_URL
        sync: false
      - key: BITRIX_RESPONSIBLE_ID
        value: "1"
      - key: BITRIX_CREATED_BY_ID
        value: "1"
      - key: BITRIX_TASK_DEADLINE_DAYS
        value: "3"
      
      # Административные переменные
      - key: ADMIN_CHAT_ID
        sync: false
      
      # Настройки приложения
      - key: PORT
        value: "3000"
      - key: LOG_LEVEL
        value: "info"
      - key: NODE_ENV
        value: "production"
      
      # Настройки Gemini
      - key: GEMINI_MODEL
        value: "gemini-1.5-flash"
      
      # Настройки базы данных
      - key: DB_PATH
        value: "/opt/render/project/src/data/bot_state.db"
    
    # Настройки здоровья приложения
    healthCheckPath: /health
    
    # Диски для постоянного хранения данных
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

