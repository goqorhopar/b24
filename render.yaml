services:
  - type: web
    name: meeting-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: TELEGRAM_BOT_TOKEN
        value: 8431167006:AAGuq0b1t119i7Lzac7idKUtwbwzH-FxqHA
      - key: GEMINI_API_KEY
        value: AIzaSyDQR42zm4pcRMkY9KzKvEmXm7hyR8UzxHI
      - key: ADMIN_CHAT_ID
        value: 7537953397
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: meeting-bot
          property: url
      # Эти переменные нужно установить вручную в панели Render
      - key: BITRIX_WEBHOOK_URL
        sync: false
      - key: BITRIX_RESPONSIBLE_ID
        sync: false
      # Опциональные переменные
      - key: BITRIX_CREATED_BY_ID
        sync: false
        optional: true
      - key: BITRIX_TASK_DEADLINE_DAYS
        value: 3
        optional: true
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
        optional: true
