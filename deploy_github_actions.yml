name: Deploy Bot to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run syntax check
      run: |
        echo "Проверяем синтаксис Python файлов..."
        python -m py_compile main.py
        python -m py_compile config.py
        python -m py_compile db.py
        python -m py_compile bitrix.py
        python -m py_compile gemini_client.py
        python -m py_compile utils.py
        echo "✅ Синтаксис корректен!"
        
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT || 22 }}
        script: |
          cd /opt/telegram-bot || cd /home/${{ secrets.VPS_USERNAME }}/telegram-bot || cd ~/telegram-bot
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          chmod +x simple_deploy.sh
          ./simple_deploy.sh
          
    - name: Notify deployment
      run: |
        echo "🚀 Деплой завершен успешно!"
        echo "Бот должен быть доступен на VPS"
