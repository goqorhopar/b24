name: Build and Push

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

concurrency:
  group: build-${{ github.repository }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Set image output
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run smoke tests
        run: |
          # Тест запуска контейнера
          docker run --rm -d --name meeting-bot-test \
            -e NODE_ENV=test \
            -e TELEGRAM_BOT_TOKEN=test_token \
            -e BITRIX_WEBHOOK_URL=https://test.bitrix24.ru/rest/1/test/ \
            -e GEMINI_API_KEY=test_key \
            -p 3000:3000 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Ожидание запуска
          sleep 30
          
          # Проверка health endpoint
          curl -f http://localhost:3000/health || exit 1
          
          # Проверка статуса
          curl -f http://localhost:3000/api/status || exit 1
          
          # Остановка контейнера
          docker stop meeting-bot-test

      - name: Test container logs
        if: failure()
        run: |
          docker logs meeting-bot-test || true
          docker stop meeting-bot-test || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Получение последнего тега
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
          else
            # Генерация changelog на основе коммитов
            CHANGELOG=$(git log --pretty=format:"- %s" ${LAST_TAG}..HEAD | head -20)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes in this Release
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## Docker Image
            
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ```
            
            ## Deployment
            
            This release is ready for deployment to production.
          draft: false
          prerelease: false

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-tests, security-scan]
    if: success()
    
    steps:
      - name: Notify deployment team
        run: |
          echo "✅ Build and push completed successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Latest: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Ready for deployment!"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-tests, security-scan]
    if: failure()
    
    steps:
      - name: Notify deployment team
        run: |
          echo "❌ Build and push failed!"
          echo "Please check the logs and fix the issues."
          exit 1
