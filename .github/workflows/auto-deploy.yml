name: Auto Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          echo "🚀 АВТОМАТИЧЕСКИЙ ДЕПЛОЙ С GITHUB"
          echo "================================="
          
          # Переход в рабочую директорию
          cd /root/b24
          
          # Остановка старого бота
          echo "🛑 Остановка старого бота..."
          systemctl stop meeting-bot-autonomous.service 2>/dev/null || true
          pkill -f "autonomous_server_bot.py" 2>/dev/null || true
          
          # Получение обновлений с GitHub
          echo "📥 Получение обновлений с GitHub..."
          git pull origin main
          
          # Установка зависимостей
          echo "🔧 Установка зависимостей..."
          pip3 install -r requirements.txt
          
          # Обновление systemd сервиса
          echo "⚙️ Обновление systemd сервиса..."
          cp meeting-bot-autonomous.service /etc/systemd/system/
          systemctl daemon-reload
          
          # Запуск бота
          echo "🚀 Запуск автономного бота..."
          systemctl start meeting-bot-autonomous.service
          
          # Проверка статуса
          echo "📊 Проверка статуса..."
          sleep 5
          systemctl status meeting-bot-autonomous.service --no-pager
          
          echo "✅ АВТОМАТИЧЕСКИЙ ДЕПЛОЙ ЗАВЕРШЕН!"
          echo "🤖 Бот работает автономно на сервере"