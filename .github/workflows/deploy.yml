name: Deploy to Beget VPS

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python (for basic checks)
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies (CI)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run basic syntax checks
      run: |
        python -m py_compile main.py
        python -m py_compile bitrix.py
        python -m py_compile db.py
        python -m py_compile gemini_client.py
        python -m py_compile utils.py

    - name: Ensure target directory exists (SSH)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        script: |
          mkdir -p /opt/telegram-bot
          chown -R root:root /opt/telegram-bot

    - name: Upload project files to VPS (SCP)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        source: .
        target: /opt/telegram-bot
        overwrite: true

    - name: Restart services on VPS (SSH)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        script: |
          echo "🚀 Applying deployment..."
          cd /opt/telegram-bot

          echo "🐍 Ensuring Python venv..."
          if [ ! -d venv ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate

          echo "📦 Installing/updating dependencies..."
          pip install --upgrade pip
          pip install -r requirements.txt

          echo "🔄 Restarting services..."
          systemctl daemon-reload
          systemctl restart telegram-bot || true
          systemctl restart telegram-poller || true

          echo "📊 Checking service status..."
          systemctl status telegram-bot --no-pager || journalctl -u telegram-bot -n 200 --no-pager
          systemctl status telegram-poller --no-pager || true

          echo "🧪 Health check..."
          sleep 5
          curl -fsS http://localhost:3000 || echo "Application not responding"

          echo "✅ Deployment completed!"
