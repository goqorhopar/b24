name: Deploy to Beget Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          # Остановка сервиса
          systemctl stop meeting-bot.service || true
          
          # Очистка места
          rm -rf /tmp/*
          rm -rf /var/tmp/*
          rm -rf /var/cache/apt/archives/*
          rm -rf /var/lib/apt/lists/*
          
          # Клонирование/обновление репозитория
          if [ -d "/root/b24" ]; then
            cd /root/b24
            git pull origin main
          else
            git clone https://github.com/${{ github.repository }} /root/b24
            cd /root/b24
          fi
          
          # Создание .env файла
          cat > .env << 'EOF'
          LOG_LEVEL=INFO
          PORT=3000
          HOST=0.0.0.0
          USE_POLLING=true
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          BITRIX_WEBHOOK_URL=${{ secrets.BITRIX_WEBHOOK_URL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          BITRIX_USER_ID=1
          DATABASE_URL=sqlite:///bot_state.db
          EOF
          
          # Установка зависимостей
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Обновление systemd сервиса
          cat > /etc/systemd/system/meeting-bot.service << 'EOF'
          [Unit]
          Description=Meeting Bot Assistant
          After=network.target
          
          [Service]
          Type=simple
          User=root
          WorkingDirectory=/root/b24
          ExecStart=/root/b24/venv/bin/python /root/b24/main.py
          Restart=always
          RestartSec=10
          Environment=LOG_LEVEL=INFO
          Environment=PORT=3000
          Environment=HOST=0.0.0.0
          Environment=USE_POLLING=true
          Environment=TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          Environment=BITRIX_WEBHOOK_URL=${{ secrets.BITRIX_WEBHOOK_URL }}
          Environment=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          Environment=BITRIX_USER_ID=1
          Environment=DATABASE_URL=sqlite:///bot_state.db
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          # Перезапуск сервиса
          systemctl daemon-reload
          systemctl enable meeting-bot.service
          systemctl start meeting-bot.service
          
          # Проверка статуса
          systemctl status meeting-bot.service --no-pager