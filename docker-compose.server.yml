version: '3.8'

services:
  meeting-bot:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: meeting-bot-server
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9090:9090"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=INFO
      - MEETING_HEADLESS=true
      - CHROME_HEADLESS=true
      - MEETING_DISPLAY_NAME=Асистент Григория
      - MEETING_DURATION_MINUTES=60
      - WHISPER_MODEL=base
      - WHISPER_LANGUAGE=ru
      - AUDIO_RECORDING_METHOD=auto
      - MAX_CONCURRENT_MEETINGS=3
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./temp:/tmp/meeting_bot
      - /dev/shm:/dev/shm
    devices:
      - /dev/snd:/dev/snd
    privileged: true
    networks:
      - meeting-bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Опциональный сервис для мониторинга
  prometheus:
    image: prom/prometheus:latest
    container_name: meeting-bot-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - meeting-bot-network
    profiles:
      - monitoring

  # Опциональный сервис для логов
  grafana:
    image: grafana/grafana:latest
    container_name: meeting-bot-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - meeting-bot-network
    profiles:
      - monitoring

networks:
  meeting-bot-network:
    driver: bridge

volumes:
  grafana-storage:
